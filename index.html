<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Offline-friendly study and exam simulator for Virginia contractor license preparation." />
    <title>BuilderPrep Pro</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <header class="topbar glass">
        <div class="brand-block">
          <div class="brand-icon">BP</div>
          <div>
            <div class="eyebrow">Virginia Contractor Exam Prep</div>
            <h1 class="brand-title">BuilderPrep Pro</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <label class="select-inline">
            <span data-i18n="language">Language</span>
            <select id="language-switcher" aria-label="Language switcher">
              <option value="en">English</option>
              <option value="es">Español</option>
            </select>
          </label>

          <label class="toggle-inline">
            <span data-i18n="darkMode">Dark mode</span>
            <input id="theme-toggle" type="checkbox" aria-label="Dark mode toggle" />
          </label>

          <button id="install-btn" class="btn btn-secondary hidden" type="button" data-i18n="installApp">
            Install app
          </button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar glass" aria-label="Primary navigation">
          <div class="profile-card">
            <div class="avatar">JP</div>
            <div>
              <div id="current-user-name" class="profile-name">Local Student</div>
              <div class="profile-meta" data-i18n="offlineReady">Offline ready</div>
            </div>
          </div>

          <nav class="nav-list">
            <button class="nav-btn active" data-route="dashboard" data-i18n="dashboard">Dashboard</button>
            <button class="nav-btn" data-route="study" data-i18n="studyMode">Study mode</button>
            <button class="nav-btn" data-route="exam" data-i18n="examMode">Exam mode</button>
            <button class="nav-btn" data-route="review" data-i18n="reviewCenter">Review center</button>
            <button class="nav-btn" data-route="progress" data-i18n="progress">Progress</button>
            <button class="nav-btn" data-route="admin" data-i18n="adminPanel">Admin panel</button>
            <button class="nav-btn" data-route="settings" data-i18n="settings">Settings</button>
          </nav>

          <div class="sync-card card">
            <div class="card-title-row">
              <h2 data-i18n="syncStatus">Sync status</h2>
              <span class="pill pill-success" id="sync-indicator">Local</span>
            </div>
            <p class="muted" data-i18n="syncDescription">
              This starter works fully offline. Cloud endpoints can be wired later.
            </p>
            <div class="stack-xs">
              <button id="export-backup" class="btn btn-secondary" type="button" data-i18n="exportBackup">Export backup</button>
              <label class="btn btn-secondary file-label">
                <span data-i18n="importBackup">Import backup</span>
                <input id="import-backup-input" type="file" accept="application/json" hidden />
              </label>
            </div>
          </div>
        </aside>

        <section class="content">
          <div id="status-banner" class="status-banner hidden"></div>
          <div id="view-root"></div>
        </section>
      </main>
    </div>

    <template id="metric-card-template">
      <article class="metric-card card">
        <div class="metric-label"></div>
        <div class="metric-value"></div>
        <div class="metric-subtle"></div>
      </article>
    </template>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
